<script type="application/json" id="speaker-notes">
[
  "Boa tarde, pessoal. Esse é o Playbook Operacional que liga Social Media e Brand Creative Design. O objetivo dessa apresentação é simples: explicar como a gente entrega quinze posts por semana com qualidade, sem queimar o designer e sem depender de apagar incêndio. Tudo isso em mais ou menos vinte minutos. Segura as setas do teclado — é interativo.",
  "Antes de entrar no conteúdo, uma visão geral. A gente vai passar por nove capítulos: começa olhando para o problema, depois apresento a solução em três alavancas. Em seguida, detalho o sistema de scores, o mix semanal, o fluxo de sete etapas, o RACI, as camadas de automação, os rituais e métricas, e por fim o plano de implementação. Quem só ler os títulos já entende a história toda.",
  "Capítulo um: O Problema. Vamos começar entendendo por que o processo atual não escala — não para desanimar ninguém, mas para reconhecer o terreno antes de mudar.",
  "Aqui está o cenário hoje. Temos quatro pessoas no time — Coord. Social, Redatora, Designer e Coord. Design. Só um designer de execução para tudo. A meta é de quinze posts por semana, três por dia, e não temos nenhum SLA formalizado. Não é falta de esforço — é falta de sistema.",
  "E o que esse diagrama mostra é o gargalo central: todas as demandas entram na mesma fila, com complexidade completamente misturada. Um quote card simples disputa com uma campanha. Sem classificação prévia, é impossível priorizar, impossível planejar, impossível escalar. Esse é o ponto que vamos atacar.",
  "Capítulo dois: A Solução. Três alavancas que, juntas, destravam a produção sem precisar contratar e sem reduzir a meta.",
  "Alavanca um: Score de esforço — a gente classifica cada post em 1, 3 ou 5 antes de entrar em produção. Alavanca dois: mix semanal — distribui os tipos de post ao longo da semana para não concentrar trabalho pesado em um único dia. Alavanca três: fluxo com RACI e SLAs claros — cada etapa tem um dono e um prazo. O resto do playbook detalha cada uma dessas três.",
  "Capítulo três: Sistema de Scores. Três faixas de complexidade, cada uma com seu tratamento próprio.",
  "Score 1 é a Fast Lane. Trinta minutos de design, template pronto no Figma, até duas adaptações de copy. Pode rodar via IA combinada com template. Datas comemorativas, quote cards — o SLA é de quatro horas úteis depois que a copy é aprovada. Aqui a gente prioriza volume e consistência.",
  "Score 3 é a Standard Lane. De uma e meia a duas e meia horas de design. Novo arranjo de elementos, adaptação de tipografia, composição a partir de ativos existentes. Exige briefing de copy completo antes de começar. SLA de um dia útil.",
  "Score 5 é a Creative Lane. De quatro a oito horas de design. É onde o time brilha — direção de arte, criação original, referência cultural forte. Score 5 precisa de conceituação prévia e entra na fila com D-menos-três, ou seja, na quinta da semana anterior. SLA de três dias úteis.",
  "Agora um momento interativo. Essa é a calculadora de score. A ideia é simples: antes de qualquer post entrar em produção, a gente responde três perguntas — sobre template, sobre copy e sobre tipo de trabalho criativo — e o sistema sugere o score e o SLA. Fiquem à vontade para testar com exemplos reais de vocês. Podem clicar nas opções.",
  "Capítulo quatro: O Mix Semanal. Porque ter scores não adianta se a gente não distribui bem ao longo da semana.",
  "Essa é a proporção ideal para quinze posts por semana: sessenta por cento Score 1, vinte e sete por cento Score 3, treze por cento Score 5. Isso dá nove, quatro e dois posts respectivamente. Em horas de designer, são aproximadamente vinte e quatro e meia horas de quarenta. Sobra um buffer de uns quinze horas por semana para imprevistos, reuniões e outros projetos.",
  "Traduzindo isso para os dias da semana: segunda e quarta começam com Score 5; terça e quinta têm Score 3 no primeiro post; sexta é mais leve. A regra de ouro — nunca dois Score 5 no mesmo dia. Score 5 sempre entra com D-menos-três, então na quinta da semana anterior já precisa estar na fila.",
  "Capítulo cinco: O Fluxo. Sete etapas do post à publicação.",
  "As sete etapas são estas. Ideação e pauta, conceituação (só para Score 5), produção de copy, produção de design, aprovação, publicação e métricas. Cada uma tem um dono. O ponto é: a gente faz o trabalho rápido quando cada etapa tem começo, meio e fim definidos.",
  "Agora a regra anti-gargalo — talvez a mais importante do playbook. A Coord. de Design não aceita novos cards se o designer já tiver mais de três em andamento. Se a fila encher, a coordenação negocia: ou o post vai para a semana seguinte, ou é convertido para um score inferior. É responsabilidade da Coord. Design fazer valer.",
  "Aprovação. A grande mudança é essa: silêncio é aprovação. Se ninguém reprova dentro do SLA, o post é aprovado automaticamente. Score 1 tem duas horas, Score 3 tem quatro horas, Score 5 tem oito horas. Máximo uma rodada de ajuste — segunda rodada exige justificativa documentada.",
  "Capítulo seis: Responsabilidades. Agora o RACI por etapa.",
  "Aqui está a matriz completa. O destaque em amarelo são as etapas em que alguém é responsável e aprovador ao mesmo tempo — R/A, dono integral. Coord. Social é dona da pauta, do briefing e do agendamento. Coord. Design é dona da conceituação de Score 5, da fila e da revisão de brand. Redatora é responsável pela copy. Designer é responsável pela produção. Leiam com calma e, se sobrar dúvida, a gente alinha depois.",
  "Capítulo sete: Automação e IA. Três camadas que aceleram o operacional.",
  "Camada um: templates Figma por canal e score. Score 1 tem template fechado — a Redatora exporta sem abrir o Figma. Camada dois: IA generativa — Claude para copy, Ideogram e Firefly para design de Score 1. Camada três: automação Notion — card com campos obrigatórios, notificação automática, aprovação expressa com deadline. A regra: todo output de IA passa pela revisão de brand antes. IA acelera o operacional para a gente ter energia para o que é Score 5.",
  "Capítulo oito: Rituais e Métricas.",
  "Os rituais obrigatórios. Weekly de pauta toda segunda nove horas, meia hora. Card do dia todo dia às oito e meia no Slack. Check de fila no fim do dia. Wrap-up na sexta. Planejamento mensal entre os dias vinte e vinte e dois. E a retro mensal de processo com o time todo. O azul são os síncronos; o verde, assíncronos.",
  "Sobre métricas. No operacional, medimos semanalmente: aderência à pauta acima de noventa por cento, SLA cumprido acima de oitenta e cinco, rodadas de revisão abaixo de um vírgula dois, utilização do designer entre sessenta e oitenta por cento. No mensal: engajamento por score, performance por canal, CPE para definir o que vale boost. E o mais importante: o mix 60/27/13 é ponto de partida, não lei. A retro ajusta.",
  "Capítulo nove: Implementação. Como a gente sai daqui e faz isso rodar.",
  "Quatro semanas. Semana um é setup: Kanban no Notion, canais no Slack, biblioteca Figma organizada por score, prompts-padrão, reunião de alinhamento e pauta das próximas duas semanas já com scores. Semana dois é piloto: rodamos o fluxo completo registrando fricções e medindo SLAs na mão. Semanas três e quatro é automatizar: implementar automações Notion, ajustar o mix com dados reais e documentar aprendizados.",
  "Antes e depois. Antes: demandas sem classificação, designer aceitando tudo, aprovação por WhatsApp, pauta de última hora. Depois: score antes de qualquer produção, fila limitada a três cards, aprovação assíncrona com deadline, antecipação mínima de dois a sete dias. A mudança não está em fazer mais — está em fazer de forma previsível.",
  "Fecho. A meta é clara: quinze posts por semana com qualidade, previsibilidade e sem sobrecarregar o designer. Próximos passos: esta semana aprovamos o playbook e marcamos o alinhamento com a equipe. Até sexta: Kanban pronto, Figma organizado, Slack aberto. Em trinta dias: ciclo rodando com SLAs medidos e primeira retro. Qualquer dúvida, o guardião sou eu. Valeu."
]
</script>
